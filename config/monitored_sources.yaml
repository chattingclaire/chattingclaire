# 监控源配置
# 指定要监控的微信群聊和公众号

# ============================================================================
# 微信群聊监控列表
# ============================================================================
wechat_groups:
  # 方式1：按群名称过滤（推荐）
  # 只要群名包含这些关键词就会被监控
  name_keywords:
    - "星球"          # 匹配包含"星球"的群
    - "讨论"          # 匹配包含"讨论"的群
    # 添加更多关键词...

  # 方式2：精确匹配群名（推荐用于包含emoji的群名）
  # 只监控这些完整名称的群
  exact_names:
    - "180K - 星球讨论群🪙"
    # 添加更多群名...

  # 方式3：按群ID过滤（高级）
  # 如果你知道群的ID，可以直接指定
  group_ids:
    # - "12345@chatroom"
    # - "67890@chatroom"

# ============================================================================
# 公众号监控列表
# ============================================================================
wechat_official_accounts:
  # 公众号名称列表（如果需要监控公众号，在这里添加）
  accounts:
    # - "财联社"
    # - "证券时报"
    # 添加你关注的公众号...

  # RSS订阅链接（如果使用WeRSS等服务）
  rss_feeds:
    # - "https://werss.app/feed/your_subscription_1"
    # - "https://werss.app/feed/your_subscription_2"

# ============================================================================
# 过滤设置
# ============================================================================
filters:
  # 是否启用群聊过滤
  # true = 只监控上面列出的群
  # false = 监控所有群
  enable_group_filter: true

  # 是否启用公众号过滤
  enable_account_filter: false  # 暂不监控公众号

  # 消息内容过滤（可选）
  # 留空 = 处理所有消息，不过滤
  # 如果只想处理包含特定词的消息，取消下面的注释
  content_keywords:
    # - "涨停"
    # - "买入"
    # - "卖出"
    # 留空则不过滤内容

  # 排除关键词（可选）
  # 包含这些词的消息会被忽略
  exclude_keywords:
    - "广告"
    - "推广"
    # 添加要排除的词...

# ============================================================================
# 示例配置（注释掉的是示例）
# ============================================================================

# 示例1：只监控两个特定群
# wechat_groups:
#   exact_names:
#     - "XX基金交流群"
#     - "YY股票研究群"

# 示例2：监控所有包含"股票"的群 + 特定公众号
# wechat_groups:
#   name_keywords:
#     - "股票"
# wechat_official_accounts:
#   accounts:
#     - "财联社"
#     - "证券时报"

# 示例3：高级过滤 - 只要包含股票代码的消息
# filters:
#   content_keywords:
#     - "[0-9]{6}"  # 6位数字（股票代码）
